<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
    <script src="https://kit.fontawesome.com/f144271f99.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <form action="">
            <h1>Signup</h1>
            <div class="name-input">
                <label for="fullname">
                    <i class="fa-regular fa-user"></i></label>
                <input type="text" id="fullname" name="fullname" placeholder="fullname">
            </div>
            <div class="email-input">
                <label for="email"><i class="fa-regular fa-envelope"></i></label>
                <input type="email" id="email" name="email" placeholder="email">
            </div>
            <div class="password-input">
                <label for="password"><i class="fa-solid fa-lock"></i></label>
                <input type="password" id="password" name="password" placeholder="password">
            </div>
            <div class="repeat-input">
                <label for="repeatpassword"><i class="fa-solid fa-lock"></i></label>
                <input type="password" id="repeat-password" name="repeat-password" placeholder="repeat-password">
            </div>
            <button type="submit" class="submit-btn">Signup</button>
        </form>
    </div>

</body>

</html>
